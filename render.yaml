# Render: use Root Directory `src/backend` (wrapper) OR `backend` (direct).
# Wrapper fixes deploys where Render expects repo path .../src/backend.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: tenantos-api
    runtime: node
    rootDir: src/backend
    buildCommand: npm install && npm run build
    startCommand: npm start
